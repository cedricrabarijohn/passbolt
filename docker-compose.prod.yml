version: '3.9'

services:
  # ---------------------------------------------------------------------------
  # Traefik — Reverse proxy + automatic Let's Encrypt SSL
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    container_name: passbolt-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Security headers
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - passbolt-net
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # MariaDB
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: passbolt-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-passbolt}
      MYSQL_USER: ${MYSQL_USER:-passbolt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - passbolt-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Passbolt CE
  # ---------------------------------------------------------------------------
  passbolt:
    image: passbolt/passbolt:latest-ce
    container_name: passbolt-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_FULL_BASE_URL: https://${DOMAIN}
      DATASOURCES_DEFAULT_HOST: db
      DATASOURCES_DEFAULT_USERNAME: ${MYSQL_USER:-passbolt}
      DATASOURCES_DEFAULT_PASSWORD: ${MYSQL_PASSWORD}
      DATASOURCES_DEFAULT_DATABASE: ${MYSQL_DATABASE:-passbolt}
      # SMTP
      EMAIL_DEFAULT_FROM: ${EMAIL_FROM:-noreply@${DOMAIN}}
      EMAIL_TRANSPORT_DEFAULT_HOST: ${SMTP_HOST:-}
      EMAIL_TRANSPORT_DEFAULT_PORT: ${SMTP_PORT:-587}
      EMAIL_TRANSPORT_DEFAULT_USERNAME: ${SMTP_USER:-}
      EMAIL_TRANSPORT_DEFAULT_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_TRANSPORT_DEFAULT_TLS: ${SMTP_TLS:-true}
      # Security
      PASSBOLT_SECURITY_CSRF_PROTECTION_ACTIVE: "true"
    volumes:
      - gpg_data:/etc/passbolt/gpg
      - jwt_data:/etc/passbolt/jwt
    networks:
      - passbolt-net
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.passbolt.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.passbolt.entrypoints=websecure"
      - "traefik.http.routers.passbolt.tls.certresolver=letsencrypt"
      - "traefik.http.services.passbolt.loadbalancer.server.port=443"
      - "traefik.http.services.passbolt.loadbalancer.server.scheme=https"
      # Security headers
      - "traefik.http.middlewares.passbolt-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.passbolt-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.passbolt-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.passbolt-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.passbolt-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.passbolt-headers.headers.browserXssFilter=true"
      - "traefik.http.routers.passbolt.middlewares=passbolt-headers"

volumes:
  db_data:
  gpg_data:
  jwt_data:
  letsencrypt_data:

networks:
  passbolt-net:
    driver: bridge
